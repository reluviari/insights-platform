# Insights Platform — stack local: MongoDB → mongo-seed (job idempotente) → API + Next.js.
# Power BI / Azure AD na nuvem — configure credenciais no .env para embed real (veja .env.docker.example).
#
# Uso na raiz:
#   cp .env.docker.example .env
#   docker compose up --build
#
# Keycloak / SSO: fora de uso — perfil `keycloak` e docker/KEYCLOAK.md só para futuro.
#
# O Compose lê o arquivo ".env" na raiz apenas para interpolar variáveis abaixo.

name: insights-platform

services:
  mongo:
    image: mongo:6
    container_name: insights-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - insights_mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "mongodb://localhost:27017/qa-pbi",
          "--eval",
          "db.adminCommand({ ping: 1 }).ok",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - insights

  api:
    build:
      context: ./insights.api
      dockerfile: Dockerfile.dev
    container_name: insights-api
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/qa-pbi}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      INSIGHTS_ADMIN_CREDENTIALS: ${INSIGHTS_ADMIN_CREDENTIALS:-placeholder_access;placeholder_secret}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET_VALUE: ${AZURE_CLIENT_SECRET_VALUE:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_USERNAME: ${AZURE_USERNAME:-}
      AZURE_PASSWORD: ${AZURE_PASSWORD:-}
      EMBED_PBI_API_URL: ${EMBED_PBI_API_URL:-https://api.powerbi.com}
    volumes:
      - ./insights.api:/app
      - insights_api_node_modules:/app/node_modules
    ports:
      - "4001:4001"
      - "4002:4002"
      - "4003:4003"
    depends_on:
      mongo:
        condition: service_healthy
      mongo-seed:
        condition: service_completed_successfully
    networks:
      - insights

  web:
    build:
      context: ./insights.web
      dockerfile: Dockerfile.dev
    container_name: insights-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_INSIGHTS_API: ${NEXT_PUBLIC_INSIGHTS_API:-http://localhost:4001}
      NEXT_PUBLIC_EMBED_PBI_APP_URL: ${NEXT_PUBLIC_EMBED_PBI_APP_URL:-https://app.powerbi.com}
      NEXT_PUBLIC_PLATAFORM_NAME: ${NEXT_PUBLIC_PLATAFORM_NAME:-Insights}
      NEXT_PUBLIC_INSIGHTS_SSO_ENABLED: ${NEXT_PUBLIC_INSIGHTS_SSO_ENABLED:-false}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-change-me}
    volumes:
      - ./insights.web:/app
      - insights_web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - insights

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: insights-keycloak
    profiles:
      - keycloak
    command: start-dev --hostname-strict=false --http-port=8080 --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./docker/keycloak/import:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /realms/insights-dev/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && timeout 15 cat <&3 | grep -q \"200\"'",
        ]
      interval: 10s
      timeout: 20s
      retries: 45
      start_period: 120s
    networks:
      - insights

  mongo-seed:
    image: mongo:6
    container_name: insights-mongo-seed
    volumes:
      - ./docker/mongo/seed-insights-keycloak-dev.js:/seed.js:ro
    networks:
      - insights
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint: ["mongosh", "mongodb://mongo:27017/qa-pbi", "/seed.js"]
    restart: "no"

networks:
  insights:
    driver: bridge

volumes:
  insights_mongo_data:
  insights_api_node_modules:
  insights_web_node_modules:

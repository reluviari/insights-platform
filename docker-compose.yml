# Insights Platform — stack local: MongoDB + API (serverless-offline) + Next.js.
# Power BI e Azure AD permanecem na nuvem Microsoft — configure credenciais no .env (veja .env.docker.example).
#
# Uso:
#   cp .env.docker.example .env
#   # edite segredos Azure / Keycloak se necessário
#   docker compose up --build
#
# Keycloak opcional (admin em http://localhost:8080):
#   docker compose --profile keycloak up --build
#   # com o profile ativo, defina no .env: KEYCLOAK_URL=http://keycloak:8080
#
# O Compose lê o arquivo ".env" na raiz apenas para interpolar variáveis abaixo.

name: insights-platform

services:
  mongo:
    image: mongo:6
    container_name: insights-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - insights_mongo_data:/data/db
    networks:
      - insights

  api:
    build:
      context: ./insights.api
      dockerfile: Dockerfile.dev
    container_name: insights-api
    restart: unless-stopped
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/qa-pbi}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      AFYA_ADMIN_CREDENTIALS: ${AFYA_ADMIN_CREDENTIALS:-placeholder_access;placeholder_secret}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET_VALUE: ${AZURE_CLIENT_SECRET_VALUE:-}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_USERNAME: ${AZURE_USERNAME:-}
      AZURE_PASSWORD: ${AZURE_PASSWORD:-}
      EMBED_PBI_API_URL: ${EMBED_PBI_API_URL:-https://api.powerbi.com}
    volumes:
      - ./insights.api:/app
      - insights_api_node_modules:/app/node_modules
    ports:
      - "4001:4001"
      - "4002:4002"
      - "4003:4003"
    depends_on:
      - mongo
    networks:
      - insights

  web:
    build:
      context: ./insights.web
      dockerfile: Dockerfile.dev
    container_name: insights-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_AFYA_INSIGHTS_API: ${NEXT_PUBLIC_AFYA_INSIGHTS_API:-http://localhost:4001}
      NEXT_PUBLIC_EMBED_PBI_APP_URL: ${NEXT_PUBLIC_EMBED_PBI_APP_URL:-https://app.powerbi.com}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-change-me}
    volumes:
      - ./insights.web:/app
      - insights_web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - insights

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: insights-keycloak
    profiles:
      - keycloak
    command: start-dev --hostname-strict=false --http-port=8080
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    networks:
      - insights

networks:
  insights:
    driver: bridge

volumes:
  insights_mongo_data:
  insights_api_node_modules:
  insights_web_node_modules:
